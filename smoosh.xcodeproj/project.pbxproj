				"$(SRCROOT)/resources/release-binaries/cjpeg",
				"$(SRCROOT)/resources/release-binaries/djpeg",
				"$(SRCROOT)/resources/release-binaries/jpegtran",
				"$(SRCROOT)/resources/release-binaries/pngquant",
				"$(SRCROOT)/resources/release-binaries/ffmpeg",
			);
			name = "Copy Release Dylibs";
			outputFileListPaths = (
			);
			outputPaths = (
				"$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/libjpeg.8.dylib",
				"$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/liblcms2.2.dylib",
				"$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/libpng16.16.dylib",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "RESOURCES=\"${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}\"\ncp -f \"${SRCROOT}/resources/release-dylibs/\"*.dylib \"${RESOURCES}\"/\ncp -f \"${SRCROOT}/resources/release-binaries/\"* \"${RESOURCES}\"/\n\n# Bundle ghostscript: copy binary and all transitive dylibs (preserving absolute Homebrew paths)\n# DYLD_FALLBACK_LIBRARY_PATH in ProcessRunner handles the path resolution at runtime.\nGS_SOURCE=\"/opt/homebrew/bin/gs\"\nif [ -f \"$GS_SOURCE\" ]; then\n  cp -f \"$GS_SOURCE\" \"${RESOURCES}/gs\"\n  chmod +w \"${RESOURCES}/gs\"\n  # Collect all transitive dylib dependencies using otool -L recursively\n  for dep in $(otool -L \"$GS_SOURCE\" 2>/dev/null | grep '/opt/homebrew/' | awk '{print $1}'); do\n    cp -f \"$dep\" \"${RESOURCES}/\" 2>/dev/null || true\n    # Also check for transitive deps of this dylib\n    for dep2 in $(otool -L \"$dep\" 2>/dev/null | grep '/opt/homebrew/' | awk '{print $1}'); do\n      cp -f \"$dep2\" \"${RESOURCES}/\" 2>/dev/null || true\n      # One more level for deep transitive deps\n      for dep3 in $(otool -L \"$dep2\" 2>/dev/null | grep '/opt/homebrew/' | awk '{print $1}'); do\n        cp -f \"$dep3\" \"${RESOURCES}/\" 2>/dev/null || true\n      done\n    done\n  done\n  # Ad-hoc sign like other bundled binaries\n  codesign --remove-signature \"${RESOURCES}/gs\" 2>/dev/null || true\n  codesign -s - --force \"${RESOURCES}/gs\" 2>/dev/null || true\nfi\n\n# Fix rpath references for other bundled binaries\nfor b in pngquant jpegtran cjpeg djpeg; do\n  [ ! -f \"${RESOURCES}/${b}\" ] && continue\n  for dep in $(otool -L \"${RESOURCES}/${b}\" 2>/dev/null | grep -E '@rpath|@loader_path/../lib' | awk '{print $1}'); do\n    base=$(basename \"${dep}\")\n    install_name_tool -change \"${dep}\" \"@loader_path/${base}\" \"${RESOURCES}/${b}\" 2>/dev/null || true\n  done\n  codesign --remove-signature \"${RESOURCES}/${b}\" 2>/dev/null || true\n  codesign -s - --force \"${RESOURCES}/${b}\" 2>/dev/null || true\ndone\n";
		};
/* End PBXShellScriptBuildPhase section */

